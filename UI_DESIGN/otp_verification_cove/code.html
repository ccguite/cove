<body class="bg-surface-bright min-h-screen flex items-center justify-center font-body-md text-on-surface relative overflow-hidden antialiased">
<!-- Background Grid Pattern -->
<div class="absolute inset-0 bg-grid-pattern z-0 pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Logo Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Seoul Serenity</h1>
</div>
<!-- Verification Card -->
<div class="bg-surface-container-low rounded-xl ambient-shadow p-stack-lg border border-surface-container-highest">
<div class="text-center mb-stack-md">
<h2 class="font-headline-sm text-headline-sm text-primary mb-unit">Verify your number</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    We've sent a 6-digit code to <br/>
<strong class="text-primary font-medium">+1 (555) 000-0000</strong>
</p>
</div>
<form class="space-y-stack-md flex flex-col items-center" id="otp-form">
<!-- OTP Input Group -->
<div class="flex justify-center gap-unit w-full" id="otp-inputs">
<!-- Inputs generated by JS for better control -->
<input aria-label="Digit 1" autofocus="" class="w-12 h-14 text-center font-headline-sm text-headline-sm text-primary bg-surface-bright border border-surface-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" maxlength="1" type="number"/>
<input aria-label="Digit 2" class="w-12 h-14 text-center font-headline-sm text-headline-sm text-primary bg-surface-bright border border-surface-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" maxlength="1" type="number"/>
<input aria-label="Digit 3" class="w-12 h-14 text-center font-headline-sm text-headline-sm text-primary bg-surface-bright border border-surface-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" maxlength="1" type="number"/>
<input aria-label="Digit 4" class="w-12 h-14 text-center font-headline-sm text-headline-sm text-primary bg-surface-bright border border-surface-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" maxlength="1" type="number"/>
<input aria-label="Digit 5" class="w-12 h-14 text-center font-headline-sm text-headline-sm text-primary bg-surface-bright border border-surface-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" maxlength="1" type="number"/>
<input aria-label="Digit 6" class="w-12 h-14 text-center font-headline-sm text-headline-sm text-primary bg-surface-bright border border-surface-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" maxlength="1" type="number"/>
</div>

                    Verify &amp; Continue
                    <span class="material-symbols-outlined" data-icon="arrow_forward" style="font-size: 18px;">arrow_forward</span>
</button>
<!-- Secondary Actions -->
<div class="flex flex-col items-center gap-stack-sm w-full mt-stack-md pt-stack-sm border-t border-surface-variant">

<span class="text-on-surface-variant">Didn't receive the code?</span>
<button class="text-primary font-medium hover:underline disabled:opacity-50 disabled:no-underline disabled:cursor-not-allowed transition-all" disabled="" id="resend-btn" type="button">
                            Resend in <span id="timer">00:45</span>
</button>
</div>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('#otp-inputs input');
            
            inputs.forEach((input, index) => {
                // Focus behavior
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1); // limit to 1 char
                    }
                    if (e.target.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                });

                // Backspace behavior
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value) {
                        if (index > 0) {
                            inputs[index - 1].focus();
                        }
                    }
                });
                
                // Paste behavior
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').slice(0, 6).replace(/\D/g, '');
                    if (pastedData) {
                        for (let i = 0; i < pastedData.length; i++) {
                            if (inputs[i]) {
                                inputs[i].value = pastedData[i];
                                if (i < inputs.length - 1) {
                                    inputs[i+1].focus();
                                } else {
                                    inputs[i].focus();
                                }
                            }
                        }
                    }
                });
            });

            // Timer Logic
            let timeLeft = 45;
            const timerSpan = document.getElementById('timer');
            const resendBtn = document.getElementById('resend-btn');

            const countdown = setInterval(() => {
                timeLeft--;
                let seconds = timeLeft % 60;
                let minutes = Math.floor(timeLeft / 60);
                
                timerSpan.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = 'Resend Code';
                }
            }, 1000);
            
            resendBtn.addEventListener('click', () => {
                 if(!resendBtn.disabled) {
                    // Reset logic here
                    resendBtn.disabled = true;
                    timeLeft = 45;
                    resendBtn.innerHTML = `Resend in <span id="timer">00:45</span>`;
                    // restart interval logic (simplified for snippet)
                 }
            });
        });
    </script>
