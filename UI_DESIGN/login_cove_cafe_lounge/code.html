<p class="font-body-md text-body-md text-on-surface-variant">Enter your phone number to receive a secure OTP.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault(); document.getElementById('otp-state').classList.remove('hidden'); this.classList.add('hidden');">

<span>+1</span>
<span class="material-symbols-outlined text-[18px]">expand_more</span>
</div>
<input class="w-full bg-transparent border-none p-0 font-body-lg text-body-lg text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none" id="phone" placeholder="(555) 000-0000" required="" type="tel"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md uppercase tracking-widest py-4 rounded-xl mt-stack-sm hover:opacity-90 transition-opacity duration-300 active:scale-[0.98]" type="submit">
                    Send OTP
                </button>
</form>

<div class="hidden flex flex-col gap-stack-md animate-[fadeIn_0.3s_ease-out]" id="otp-state">
<div class="flex justify-between gap-unit">

<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script>
        // Simple script to auto-advance OTP inputs
        document.querySelectorAll('#otp-state input').forEach((input, index, inputs) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
